<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MSS Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div>
        <div class="title">MSS Dashboard</div>
        <div class="subtitle">CSV viewer (GitHub Pages) • warna otomatis hijau/kuning/merah</div>
      </div>
      <div class="badge"><span class="dot"></span><span id="statusText">Ready</span></div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="toolbar">
        <div class="field">
          <label>Dataset (CSV)</label>
          <select id="dataset"></select>
        </div>

        <div class="field">
          <label>Rows per page</label>
          <select id="rpp">
            <option>50</option>
            <option selected>100</option>
            <option>200</option>
            <option>500</option>
          </select>
        </div>

        <div class="spacer"></div>

        <button class="btn" id="prev">← Prev</button>
        <button class="btn" id="next">Next →</button>
        <button class="btn primary" id="reload">Refresh</button>
      </div>

      <div class="info">
        <div id="meta">—</div>
        <div class="legend">
          <span class="pill"><b>Legend</b></span>
          <span class="pill g">Hijau ≥ 99</span>
          <span class="pill y">Kuning 95–98.99</span>
          <span class="pill r">Merah &lt; 95</span>
          <span class="pill"><code>1=Hijau</code> <code>0=Merah</code></span>
        </div>
      </div>

      <div class="tableWrap">
        <table id="tbl"></table>
      </div>

      <div class="footer">
        File aktif: <code id="activeFile">-</code>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
