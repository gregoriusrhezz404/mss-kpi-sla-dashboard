<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MSS Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div>
        <div class="title">MSS Dashboard</div>
        <div class="subtitle">CSV viewer • warna otomatis • GitHub Pages</div>
      </div>

      <div class="statusPill" title="Status load">
        <span class="dot" id="dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="toolbar">
        <div class="field">
          <label>Dataset</label>
          <select id="dataset"></select>
        </div>

        <div class="field grow">
          <label>Search</label>
          <div class="searchWrap">
            <input id="q" placeholder="Cari Site ID / Site Name / angka…" />
            <button class="iconBtn" id="clear" title="Clear">✕</button>
          </div>
        </div>

        <div class="field">
          <label>Rows/page</label>
          <select id="rpp">
            <option>50</option>
            <option selected>100</option>
            <option>200</option>
            <option>500</option>
          </select>
        </div>

        <div class="spacer"></div>

        <button class="btn" id="prev">← Prev</button>
        <button class="btn" id="next">Next →</button>
        <button class="btn primary" id="reload">Refresh</button>
      </div>

      <div class="metaRow">
        <div class="chips">
          <span class="chip">Rows: <b id="rowsCount">0</b></span>
          <span class="chip">Filtered: <b id="filteredCount">0</b></span>
          <span class="chip">Page: <b id="pageInfo">1/1</b></span>
          <span class="chip">File: <code id="activeFile">-</code></span>
        </div>

        <div class="legend">
          <span class="legendItem g">Hijau ≥ 99</span>
          <span class="legendItem y">Kuning 95–98.99</span>
          <span class="legendItem r">Merah &lt; 95</span>
          <span class="legendItem">1=Hijau • 0=Merah</span>
        </div>
      </div>

      <div class="tableWrap">
        <table id="tbl"></table>
      </div>

      <div class="footer">
        Tips: tekan <kbd>/</kbd> untuk fokus ke search, <kbd>Esc</kbd> untuk clear.
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
